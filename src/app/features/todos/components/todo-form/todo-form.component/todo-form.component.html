<div class="form-container w-full max-w-xl mx-auto p-4 sm:p-6 bg-white rounded-xl shadow-md">
  <header class="mb-6 text-center">
    <h2 class="text-2xl font-bold text-gray-800">
      {{ isEditMode() ? 'Editar Tarea' : 'Nueva Tarea' }}
    </h2>
  </header>

  <form [formGroup]="todoForm" (ngSubmit)="onSubmit()" class="space-y-5">
    <div class="form-group flex flex-col gap-1">
      <label for="title" class="text-sm font-medium text-gray-700">Título:</label>
      <input
        id="title"
        type="text"
        formControlName="title"
        placeholder="Ej: Configurar Entity Framework"
        class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
      />

      @if (todoForm.controls.title.invalid && todoForm.controls.title.touched) {
        <span class="error-text text-sm text-red-500">El título es obligatorio.</span>
      }
    </div>

    <div class="form-group flex flex-col gap-1">
      <label for="description" class="text-sm font-medium text-gray-700"
        >Descripción (Opcional):</label
      >
      <textarea
        id="description"
        formControlName="description"
        rows="3"
        placeholder="Detalles de la tarea..."
        class="w-full px-3 py-2 border border-gray-300 rounded-lg resize-none focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
      ></textarea>
    </div>

    @if (isEditMode()) {
      <div class="form-group flex flex-col gap-1">
        <label for="statusId" class="text-sm font-medium text-gray-700">Estado:</label>
        <select
          id="statusId"
          formControlName="statusId"
          class="w-full px-3 py-2 border border-gray-300 rounded-lg bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition"
        >
          <option [value]="1">Pendiente</option>
          <option [value]="2">En Proceso</option>
          <option [value]="3">Realizado</option>
          <option [value]="4">Cancelado</option>
        </select>
      </div>
    }

    <div class="form-actions flex flex-col sm:flex-row gap-3 sm:justify-end pt-2">
      <button
        type="button"
        class="btn-cancel w-full sm:w-auto px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-100 transition"
        (click)="onCancel()"
      >
        Cancelar
      </button>

      <button
        type="submit"
        class="btn-submit w-full sm:w-auto px-4 py-2 rounded-lg bg-blue-600 text-white font-medium hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed transition"
        [disabled]="todoForm.invalid || isLoading()"
      >
        {{ isLoading() ? 'Guardando...' : 'Guardar Tarea' }}
      </button>
    </div>
  </form>
</div>
